<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prueba de cámara</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    padding:20px;
}

h1{
    margin-top:20px;
}

video{
    width:95%;
    max-width:500px;
    border-radius:15px;
    margin-top:20px;
    background:black;
}

button{
    margin-top:20px;
    padding:15px 25px;
    font-size:18px;
    border:none;
    border-radius:12px;
    background:#ff4081;
    color:white;
}

#mensaje{
    margin-top:15px;
    font-size:18px;
}
</style>

</head>

<body>

<h1>Prueba de grabación 📹</h1>

<button id="btn">Comenzar</button>

<p id="mensaje"></p>

<video id="preview" autoplay muted playsinline></video>

<h2>Video grabado</h2>

<video id="resultado" controls playsinline></video>

<script>

const btn=document.getElementById("btn");
const preview=document.getElementById("preview");
const resultado=document.getElementById("resultado");
const mensaje=document.getElementById("mensaje");

let recorder;
let chunks=[];

btn.onclick=async()=>{

mensaje.textContent="Solicitando cámara...";

try{

const stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:"user"},
audio:true
});

preview.srcObject=stream;

chunks=[];

const tipo=[
"video/webm;codecs=vp9",
"video/webm;codecs=vp8",
"video/webm"
].find(t=>MediaRecorder.isTypeSupported(t));

recorder=tipo
?new MediaRecorder(stream,{mimeType:tipo})
:new MediaRecorder(stream);

recorder.ondataavailable=e=>{
if(e.data.size>0){
chunks.push(e.data);
}
};

recorder.onstop=()=>{

const blob=new Blob(chunks,{
type:recorder.mimeType
});

resultado.src=URL.createObjectURL(blob);

stream.getTracks().forEach(t=>t.stop());

mensaje.textContent="¡Grabación terminada!";
};

recorder.start();

mensaje.textContent="Grabando 5 segundos...";

setTimeout(()=>{

recorder.stop();

},5000);

}catch(error){

alert(error.message);

console.log(error);

}

};

</script>

</body>
</html>
