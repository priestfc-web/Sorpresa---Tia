<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Una sorpresa para ti ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:linear-gradient(135deg,#ff9ecb,#ffd9ec);

height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

}

#contenedor{

width:800px;

max-width:90%;

background:white;

border-radius:25px;

padding:40px;

box-shadow:0 20px 60px rgba(0,0,0,.25);

text-align:center;

}

h1{

font-size:45px;

margin-bottom:25px;

color:#ff4081;

}

p{

font-size:22px;

margin-bottom:30px;

color:#444;

line-height:1.5;

}

button{

background:#ff4081;

color:white;

border:none;

padding:18px 35px;

font-size:22px;

border-radius:50px;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.05);

}

video{

margin-top:25px;

width:100%;

border-radius:20px;

display:none;

}

#contador{

font-size:120px;

display:none;

color:#ff4081;

font-weight:bold;

margin-top:25px;

}

img{

display:none;

width:75%;

margin:auto;

margin-top:20px;

border-radius:20px;

}

</style>

</head>

<body>

<div id="contenedor">

<h1>

❤️ Hola hermanita ❤️

</h1>

<p>

Tengo algo muy importante que decirte...

Pero antes quiero guardar este momento para siempre.

</p>

<button id="comenzar">

Comenzar

</button>

<div id="contador">

3

</div>

<video id="camara" autoplay playsinline muted></video>

<img id="ultra" src="Ultrasonido.jpg">

<h1 id="titulo2" style="display:none;">

👶 ¡VAS A SER TÍA! 👶

</h1>

<p id="texto2" style="display:none;">

Nuestro bebé ya viene en camino.

Queríamos que fueras de las primeras personas en enterarte.

❤️

</p>

<video id="resultado" controls></video>

</div>

<script>

const boton = document.getElementById("comenzar");
const camara = document.getElementById("camara");
const contador = document.getElementById("contador");

let stream;
let mediaRecorder;
let partes = [];

boton.onclick = async () => {

    boton.style.display = "none";

    stream = await navigator.mediaDevices.getUserMedia({
        video: true,
        audio: true
    });

    camara.srcObject = stream;
    camara.style.display = "block";

    mediaRecorder = new MediaRecorder(stream);

    partes = [];

    mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) {
            partes.push(e.data);
        }
    };

    mediaRecorder.start();

    let numero = 3;

    contador.style.display = "block";

    contador.innerHTML = numero;

    let intervalo = setInterval(() => {

        numero--;

        contador.innerHTML = numero;

        if (numero == 0) {

            clearInterval(intervalo);

            contador.style.display = "none";

            document.getElementById("ultra").style.display = "block";

            document.getElementById("titulo2").style.display = "block";

            document.getElementById("texto2").style.display = "block";

        }

    },1000);

};

</script>

</body>

</html>
